name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4

      - name: Install & test backend
        working-directory: backend
        uses: actions/setup-node@v4  # Move setup-node inside the directory-specific step
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json  # Specific cache path
        run: |
          npm ci  # Use ci instead of install for clean installs
          npm test

      - name: Install & test frontend
        working-directory: frontend
        uses: actions/setup-node@v4  # Separate setup for frontend
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
        run: |
          npm ci
          npm test

  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3  # Updated to v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5  # Updated to v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/temp-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/temp-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
